    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 30% 20%, #0f0a1a, #050210);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', 'Inter', 'Poppins', system-ui, sans-serif;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        .universe {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: rgba(10, 5, 20, 0.65);
            backdrop-filter: blur(2px);
            overflow: hidden;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            cursor: grab;
        }
        canvas:active { cursor: grabbing; }

        .glass-panel {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(12, 6, 22, 0.95);
            backdrop-filter: blur(18px);
            border-radius: 60px;
            padding: 10px 24px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 30;
            border: 1px solid rgba(255, 200, 100, 0.5);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            max-width: 95vw;
            max-height: 110px;
            overflow-y: auto;
        }

        .game-trigger {
            background: rgba(0, 0, 0, 0.75);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.75rem;
            color: #ffeedd;
            cursor: pointer;
            border-left: 3px solid #ffaa66;
            transition: 0.2s;
        }
        .game-trigger.active { background: #ff6a3a; color: white; }
        .game-trigger:hover { transform: translateY(-2px); background: rgba(255, 100, 60, 0.95); }
        .theme-reset { background: rgba(80, 50, 120, 0.85); border-left-color: #c9aaff !important; }
        .theme-reset.active { background: #aa88ff; }

        @media (max-width: 750px) {
            .glass-panel { padding: 8px 16px; bottom: 10px; max-height: 95px; gap: 6px; }
            .game-trigger { padding: 5px 12px; font-size: 0.65rem; }
        }
    </style>
</head>

        function resize() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
            
            const cols = 6;
            const rows = 4;
            const startX = w * 0.08;
            const startY = h * 0.10;
            const endX = w * 0.92;
            const endY = h - BOTTOM_RESERVE - 20;
            
            const stepX = (endX - startX) / (cols - 1);
            const stepY = (endY - startY) / (rows - 1);
            
            const usedThemes = [...new Set(people.map(p => p.theme))].sort();
            
            for (let i = 0; i < usedThemes.length; i++) {
                const theme = usedThemes[i];
                const col = i % cols;
                const row = Math.floor(i / cols);
                targets[theme] = {
                    x: startX + col * stepX,
                    y: startY + row * stepY
                };
                targets[theme].x = Math.min(w - 90, Math.max(90, targets[theme].x));
                targets[theme].y = Math.min(endY - 20, Math.max(100, targets[theme].y));
            }
            
            for (let item of items) {
                item.x = Math.random() * (w - 200) + 100;
                item.y = Math.random() * (endY - 150) + 80;
                item.vx = 0;
                item.vy = 0;
                item.settled = false;
            }
        }
        
        window.addEventListener('resize', () => { resize(); repositionAllItems(); });

        function repositionAllItems() {
            const safeTop = 80;
            const safeBottom = h - BOTTOM_RESERVE - 30;
            for (let item of items) {
                item.x = Math.random() * (w - 200) + 100;
                item.y = Math.random() * (safeBottom - safeTop) + safeTop;
                item.vx = 0;
                item.vy = 0;
                item.settled = false;
            }
        }
        
        let activeGame = null;
        let themeMode = false;
        
        function updateTargets() {
            const centerX = w/2;
            const centerY = h/2;
            const perimeterRadius = Math.min(w, h - BOTTOM_RESERVE) * 0.38;
            
            for (let item of items) {
                if (themeMode) {
                    const t = targets[item.theme];
                    if (t) {
                        item.targetX = t.x;
                        item.targetY = t.y;
                    }

                        item.targetY = centerY;

                        let tx = centerX + Math.cos(angle) * perimeterRadius;
                        let ty = centerY + Math.sin(angle) * perimeterRadius;
                        item.targetX = Math.min(w - 70, Math.max(70, tx));
                        item.targetY = Math.min(h - BOTTOM_RESERVE - 30, Math.max(80, ty));
                    }
                } else {
                    item.targetX = null;
                    item.targetY = null;
                }
            }
        }
        
        function update() {
            updateTargets();
            const safeBottom = h - BOTTOM_RESERVE - 25;
            
            for (let item of items) {
                if (item.targetX === null || item.targetY === null) {
                    if (item.settled) {
                        item.vx += (Math.random() - 0.5) * 0.012;
                        item.vy += (Math.random() - 0.5) * 0.012;
                        item.vx *= 0.98;
                        item.vy *= 0.98;
                        const maxIdle = 0.2;
                        if (Math.abs(item.vx) > maxIdle) item.vx = item.vx > 0 ? maxIdle : -maxIdle;
                        if (Math.abs(item.vy) > maxIdle) item.vy = item.vy > 0 ? maxIdle : -maxIdle;
                        item.x += item.vx;
                        item.y += item.vy;
                        item.y = Math.min(safeBottom - 20, Math.max(50, item.y));
                    }
                    continue;
                }
                
                const dx = item.targetX - item.x;
                const dy = item.targetY - item.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 8) {
                    item.x = item.targetX;
                    item.y = item.targetY;
                    item.vx = 0;
                    item.vy = 0;
                    if (!item.settled) item.settled = true;
                } 
                else {
                    item.settled = false;
                    let force = 0.10;
                    if (dist > 100) force = 0.18;
                    if (dist > 250) force = 0.28;
                    
                    const fx = (dx / dist) * force;
                    const fy = (dy / dist) * force;
                    item.vx += fx;
                    item.vy += fy;
                    
                    const maxSpeed = 4.5;
                    if (Math.abs(item.vx) > maxSpeed) item.vx = item.vx > 0 ? maxSpeed : -maxSpeed;
                    if (Math.abs(item.vy) > maxSpeed) item.vy = item.vy > 0 ? maxSpeed : -maxSpeed;
                    
                    item.vx *= 0.94;
                    item.vy *= 0.94;
                    item.x += item.vx;
                    item.y += item.vy;
                }
                
                const pad = 45;
                if (item.x < pad) { item.x = pad; if (!item.settled) item.vx = -item.vx * 0.3; }
                if (item.x > w - pad) { item.x = w - pad; if (!item.settled) item.vx = -item.vx * 0.3; }
                if (item.y < 50) { item.y = 50; if (!item.settled) item.vy = -item.vy * 0.3; }
                if (item.y > safeBottom - 15) { 
                    item.y = safeBottom - 15; 
                    if (!item.settled) item.vy = -item.vy * 0.3; 
                }
            }
            
            for (let i = 0; i < items.length; i++) {
                for (let j = i + 1; j < items.length; j++) {
                    const a = items[i];
                    const b = items[j];
                    const dx = b.x - a.x;
                    const dy = b.y - a.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = 56;
                    if (dist < minDist) {
                        const angle = Math.atan2(dy, dx);
                        const overlap = minDist - dist;
                        const push = overlap * 0.3;
                        a.x -= Math.cos(angle) * push;
                        a.y -= Math.sin(angle) * push;
                        b.x += Math.cos(angle) * push;
                        b.y += Math.sin(angle) * push;
                        if (!a.settled) {
                            a.vx -= Math.cos(angle) * 0.04;
                            a.vy -= Math.sin(angle) * 0.04;
                        }
                        if (!b.settled) {
                            b.vx += Math.cos(angle) * 0.04;
                            b.vy += Math.sin(angle) * 0.04;
                        }
                        a.y = Math.min(safeBottom - 15, Math.max(50, a.y));
                        b.y = Math.min(safeBottom - 15, Math.max(50, b.y));
                    }
                }
            }
        }
        
        function drawReadableText(text, x, y, fontSize, color) {
            ctx.font = `700 ${fontSize}px 'Segoe UI', 'Inter', system-ui`;
            ctx.lineWidth = 3.5;
            ctx.strokeStyle = "#000000";
            ctx.shadowBlur = 0;
            ctx.strokeText(text, x, y);
            ctx.fillStyle = color;
            ctx.fillText(text, x, y);
        }
        
        function draw() {
            ctx.clearRect(0, 0, w, h);
            
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, "#120c1f");
            grad.addColorStop(1, "#06030f");
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);
            
            ctx.fillStyle = "rgba(255,200,150,0.12)";
            for (let i = 0; i < 250; i++) {
                ctx.fillRect((i * 173) % w, (i * 97) % h, 1.5, 1.5);
            }
            
            if (themeMode) {
                const sortedUsedThemes = [...new Set(people.map(p => p.theme))].sort();
                for (let theme of sortedUsedThemes) {
                    const pos = targets[theme];
                    if (!pos) continue;
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 70, 0, Math.PI*2);
                    ctx.strokeStyle = themeColors[theme];
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.arc(pos.x, pos.y, 64, 0, Math.PI*2);
                    ctx.strokeStyle = themeColors[theme] + "66";
                    ctx.lineWidth = 1.2;
                    ctx.stroke();
                    
                    const label = `${themeEmoji[theme]} ${theme}`;
                    const fontSize = Math.max(12, Math.min(15, w/55));
                    ctx.font = `bold ${fontSize}px 'Segoe UI', 'Inter'`;
                    ctx.fillStyle = themeColors[theme];
                    ctx.shadowBlur = 3;
                    const textW = ctx.measureText(label).width;
                    ctx.fillText(label, pos.x - textW/2, pos.y - 80);
                }
            }
            
            if (activeGame && !themeMode) {
                const cx = w/2;
                const cy = h/2;
                const outerRadius = Math.min(w, h - BOTTOM_RESERVE) * 0.32;
                
                ctx.beginPath();
                ctx.arc(cx, cy, 100, 0, Math.PI*2);
                ctx.strokeStyle = "#ffbb77dd";
                ctx.lineWidth = 2.8;
                ctx.setLineDash([10, 15]);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(cx, cy, outerRadius, 0, Math.PI*2);
                ctx.strokeStyle = "#ffaa88aa";
                ctx.stroke();
                ctx.setLineDash([]);
                
                ctx.font = `700 ${Math.max(28, Math.min(44, w/35))}px 'Segoe UI', 'Inter', system-ui`;
                ctx.fillStyle = "#ffdd99";
                ctx.shadowBlur = 5;
                const textWidth = ctx.measureText(activeGame).width;
                ctx.fillText(activeGame, cx - textWidth/2, cy - outerRadius + 28);
            }
            
            // Draw all items with YOUR EXACT IMAGES
            for (let item of items) {
                const color = themeColors[item.theme];
                const img = imageCache[item.name];
                
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.arc(item.x, item.y, 28, 0, Math.PI*2);
                
                if (img && img.complete && img.naturalWidth > 0) {
                    ctx.save();
                    ctx.clip();
                    ctx.drawImage(img, item.x - 28, item.y - 28, 56, 56);
                    ctx.restore();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                } else {
                    ctx.fillStyle = color + "aa";
                    ctx.fill();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = 2.5;
                    ctx.stroke();
                    
                    ctx.font = `34px 'Segoe UI Emoji'`;
                    ctx.fillStyle = "white";
                    ctx.fillText(themeEmoji[item.theme], item.x - 17, item.y + 13);
                }
                
                let displayName = item.name;
                if (displayName.length > 16) displayName = displayName.substring(0, 14) + "..";
                const nameSize = Math.max(12, Math.min(15, w/55));
                ctx.font = `700 ${nameSize}px 'Segoe UI', 'Inter', system-ui`;
                ctx.shadowBlur = 2;
                ctx.lineWidth = 3;
                ctx.strokeStyle = "#000000";
                const nameWidth = ctx.measureText(displayName).width;
                ctx.strokeText(displayName, item.x - nameWidth/2, item.y + 48);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillText(displayName, item.x - nameWidth/2, item.y + 48);
            }
        }
        
        function resetAllSettled() {
            for (let item of items) item.settled = false;
        }
        
        function setGame(game) {
            themeMode = false;
            if (activeGame === game) activeGame = null;
            else { activeGame = game; resetAllSettled(); }
            updateButtons();
        }
        
        function setThemeMode() {
            activeGame = null;
            themeMode = !themeMode;
            resetAllSettled();
            updateButtons();
        }
        
        function updateButtons() {
            document.querySelectorAll('.game-trigger').forEach(btn => {
                const game = btn.getAttribute('data-game');
                const isTheme = btn.getAttribute('data-theme') === 'reset';
                if (game) {
                    if (activeGame === game && !themeMode) btn.classList.add('active');
                    else btn.classList.remove('active');
                } else if (isTheme) {
                    if (themeMode) btn.classList.add('active');
                    else btn.classList.remove('active');
                }
            });
        }
        
        function buildUI() {
            const panel = document.getElementById('buttonPanel');
            panel.innerHTML = '';
            
            const themeBtn = document.createElement('button');
            themeBtn.className = 'game-trigger theme-reset';
            themeBtn.textContent = '🎯 THEME';
            themeBtn.setAttribute('data-theme', 'reset');
            themeBtn.addEventListener('click', setThemeMode);
            panel.appendChild(themeBtn);
            
            for (let game of allGames) {
                const btn = document.createElement('button');
                btn.className = 'game-trigger';
                btn.textContent = game;
                btn.setAttribute('data-game', game);
                btn.addEventListener('click', () => setGame(game));
                panel.appendChild(btn);
            }
        }
        
        function animate() {
            update();
            draw();
            requestAnimationFrame(animate);
        }
        
        buildUI();
        resize();
        animate();
    })();
</script>
</body>
